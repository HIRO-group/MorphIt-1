name: Deploy

on:
  push:
    branches: [main, web]
    paths:
      - "src/**"
      - "web/**"
      - "Dockerfile"
      - ".dockerignore"
      - "requirements-docker.txt"
      - ".github/workflows/deploy.yml"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: hiro-group/morphit-1
  KUBE_NAMESPACE: morphit
  DEPLOYMENT_NAME: morphit

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: azure/setup-kubectl@v4
        with:
          version: v1.29.0
      - name: Configure kubeconfig
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
        run: |
          mkdir -p "$HOME/.kube"
          echo "${KUBECONFIG_B64}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
      # The kubeconfig points at the morphit-deployer ServiceAccount, which
      # is scoped (via k8s/deployer.yaml) to patch only the `morphit`
      # Deployment in the `morphit` namespace. Bootstrap of the namespace,
      # Deployment, Service, Ingress, and the deployer SA itself is done
      # one-time out-of-band with admin credentials.
      - name: Roll forward to this commit's image
        run: |
          kubectl -n "$KUBE_NAMESPACE" set image deployment/$DEPLOYMENT_NAME \
            $DEPLOYMENT_NAME=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
      - name: Wait for rollout
        run: kubectl -n "$KUBE_NAMESPACE" rollout status deploy/$DEPLOYMENT_NAME --timeout=300s
