apiVersion: apps/v1
kind: Deployment
metadata:
  name: morphit
  namespace: morphit
  labels:
    app: morphit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: morphit
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: morphit
    spec:
      imagePullSecrets:
        - name: ghcr-creds
      containers:
        - name: morphit
          # Bootstrap tag; the deploy workflow rolls forward to a SHA tag
          # via `kubectl set image` after the manifest is applied.
          image: ghcr.io/hiro-group/morphit-1:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          # Probes are intentionally tolerant. /pack-link now runs MorphIt
          # in a worker thread (asyncio.to_thread), but an unlucky garbage
          # collect or mesh load can still pause the event loop for a
          # second or two. Pulling the pod from rotation mid-pack causes
          # 503s on the next /pack-link call, so failureThreshold buys
          # ~3 minutes of probe failures before kubernetes acts.
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 18    # ~3 min (10s × 18) before unready
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 6     # ~3 min before restart
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
